<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Contact Kayode - Front-end Developer in Lagos, Nigeria">
    
    <meta property="og:title" content="Contact | Kayode">
    <meta property="og:description" content="Get in touch for web development projects.">
    
    <title>Contact | Kayode</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <nav>
            <div class="logo">Kayode</div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="projects.html">Projects</a></li>
                <li><a href="services.html">Services</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
            <button class="mobile-menu">☰</button>
            <button id="theme-toggle" class="theme-toggle">🌙</button>
        </nav>
    </header>

    <section style="padding-top: 100px; max-width: 700px; margin: 0 auto;">
        <h1 style="text-align: center; margin-bottom: 3rem;">Get In Touch</h1>
        
        <form action="https://formspree.io/f/YOUR_CODE_HERE" method="POST">
            <input type="text" name="name" placeholder="Your Name" required style="width: 100%; padding: 14px; margin: 12px 0; border: 1px solid var(--border); border-radius: 8px; background: var(--card); color: var(--text);">
            <input type="email" name="email" placeholder="Your Email" required style="width: 100%; padding: 14px; margin: 12px 0; border: 1px solid var(--border); border-radius: 8px; background: var(--card); color: var(--text);">
            <textarea name="message" rows="6" placeholder="Tell me about your project..." required style="width: 100%; padding: 14px; margin: 12px 0; border: 1px solid var(--border); border-radius: 8px; background: var(--card); color: var(--text);"></textarea>
            <button type="submit" class="btn primary" style="width: 100%; padding: 16px; font-size: 1.1rem;">Send Message</button>
        </form>

        <p style="text-align: center; margin-top: 3rem; font-size: 1.1rem;">
            📍 Lagos, Nigeria<br>
            📧 kayodemosadoluwa714@gmail.com
        </p>
    </section>

    <script src="js/script.js"></script>
    
    <!-- Footer -->
    <footer style="background: var(--card); padding: 4rem 5% 2rem; margin-top: 4rem; text-align: center; border-top: 1px solid var(--border);">
        <p style="margin-bottom: 1rem; font-size: 1.1rem;">&copy; 2026 Kayode. All Rights Reserved.</p>
        <div style="margin: 1.5rem 0;">
            <a href="index.html" style="margin: 0 15px; color: var(--text); text-decoration: none;">Home</a>
            <a href="about.html" style="margin: 0 15px; color: var(--text); text-decoration: none;">About</a>
            <a href="projects.html" style="margin: 0 15px; color: var(--text); text-decoration: none;">Projects</a>
            <a href="services.html" style="margin: 0 15px; color: var(--text); text-decoration: none;">Services</a>
            <a href="contact.html" style="margin: 0 15px; color: var(--text); text-decoration: none;">Contact</a>
        </div>
        <p style="font-size: 0.95rem; opacity: 0.8;">
            Built with ❤️ in Nigeria • 
            <a href="https://github.com/kayodemosadoluwa714/my-portfolio" target="_blank" style="color: var(--primary);">View Source</a>
        </p>
    </footer>
</body>
</html>
